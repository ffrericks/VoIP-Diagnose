<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voys Report Analyzer</title>
  <link rel="icon" type="image/png" href="https://www.voys.nl/app/themes/voys/public/build/assets/favicon-32x32-BEMKwA8R.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --voys: #270697;
      --voys-rgb: 39, 6, 151;
      --voys-dark: #1d0572;
      --bs-font-sans-serif: 'Montserrat', sans-serif;
    }

    body { background-color: #f5f4fb; color: #1a1a2e; }

    .card { border: 1px solid rgba(0,0,0,.07); border-radius: 14px; }
    .btn-primary { background-color: var(--voys); border-color: var(--voys); }
    .btn-primary:hover, .btn-primary:focus { background-color: var(--voys-dark); border-color: var(--voys-dark); }
    .btn-outline-primary { color: var(--voys); border-color: var(--voys); }
    .btn-outline-primary:hover { background-color: var(--voys); color: #fff; }
    .text-primary { color: var(--voys) !important; }
    .form-control:focus {
      border-color: var(--voys);
      box-shadow: 0 0 0 0.2rem rgba(var(--voys-rgb), 0.15);
    }

    /* ── Status badges ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: .03em;
    }
    .badge-ok   { background: rgba(25,135,84,.1);          color: #157347; border: 1px solid rgba(25,135,84,.25); }
    .badge-warn { background: rgba(255,193,7,.15);         color: #856404; border: 1px solid rgba(255,193,7,.4); }
    .badge-bad  { background: rgba(220,53,69,.08);         color: #b02a37; border: 1px solid rgba(220,53,69,.25); }
    .badge-info { background: rgba(var(--voys-rgb),.07);   color: var(--voys); border: 1px solid rgba(var(--voys-rgb),.2); }
    .badge-na   { background: rgba(0,0,0,.05);             color: #6c757d; border: 1px solid rgba(0,0,0,.12); }

    /* ── Overall bar ── */
    .overall-bar {
      border-radius: 12px; padding: .9rem 1.1rem;
      display: flex; align-items: center; gap: 10px;
    }
    .overall-ok   { background: rgba(25,135,84,.08);  border: 1.5px solid rgba(25,135,84,.3); }
    .overall-warn { background: rgba(255,193,7,.12);  border: 1.5px solid rgba(255,193,7,.5); }
    .overall-bad  { background: rgba(220,53,69,.07);  border: 1.5px solid rgba(220,53,69,.3); }

    /* ── Metric cards ── */
    .metric-card {
      border-radius: 12px; padding: .85rem 1rem;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff; height: 100%;
    }
    .metric-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; margin-bottom: .4rem; }
    .metric-value { font-size: .92rem; font-weight: 600; }
    .metric-sub   { font-size: .75rem; color: #6c757d; margin-top: 2px; }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .dot-ok   { background: #198754; }
    .dot-warn { background: #ffc107; }
    .dot-bad  { background: #dc3545; }
    .dot-na   { background: #adb5bd; }

    /* ── Tip cards ── */
    .tip-card { border-radius: 10px; padding: .8rem 1rem; border-left: 4px solid; margin-bottom: .5rem; }
    .tip-bad  { border-color: #dc3545; background: rgba(220,53,69,.05); }
    .tip-warn { border-color: #ffc107; background: rgba(255,193,7,.07); }
    .tip-info { border-color: var(--voys); background: rgba(var(--voys-rgb),.05); }
    .tip-ok   { border-color: #198754; background: rgba(25,135,84,.05); }
    .tip-label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; opacity: .7; }
    .tip-body  { font-size: .85rem; margin-top: 2px; }

    /* ── Section label ── */
    .section-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #6c757d;
      border-bottom: 1px solid rgba(0,0,0,.07);
      padding-bottom: .35rem; margin-bottom: .85rem;
    }

    /* ── Report rows ── */
    .report-row { background: #fff; border: 1px solid rgba(0,0,0,.08); border-radius: 12px; overflow: hidden; }
    .report-row-header {
      display: flex; align-items: center; gap: 10px;
      padding: .75rem 1rem; cursor: pointer;
      transition: background .1s;
    }
    .report-row-header:hover { background: rgba(var(--voys-rgb),.03); }
    .report-row-detail { border-top: 1px solid rgba(0,0,0,.07); background: #fafaf9; }

    .btn-icon {
      width: 28px; height: 28px; border-radius: 7px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .8rem; line-height: 1; flex-shrink: 0;
    }

    /* ── Chart cards ── */
    .chart-card { padding: 1rem 1.1rem; }
    .chart-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; margin-bottom: .6rem; }

    /* ── Textarea ── */
    #reportInput { font-family: 'Courier New', monospace; font-size: .78rem; resize: vertical; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn .2s ease; }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:880px">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <img src="https://www.voys.nl/app/themes/voys/public/build/assets/favicon-32x32-BEMKwA8R.png"
         alt="Voys" style="width:36px;height:36px;border-radius:8px">
    <div>
      <h4 class="mb-0 fw-bold text-primary">Report Analyzer</h4>
      <div style="font-size:.78rem;color:#6c757d">Voys VoIP Diagnosis · Support Tool</div>
    </div>
  </div>

  <!-- Input card -->
  <div class="card mb-3">
    <div class="card-body p-3">
      <label class="form-label fw-semibold mb-1" style="font-size:.85rem">Paste diagnosis report</label>
      <div style="font-size:.75rem;color:#6c757d;margin-bottom:.5rem">Supports Dutch and English · Ctrl+Enter to add</div>
      <textarea id="reportInput" class="form-control" rows="8"
        placeholder="Paste the full VoIP diagnosis report here…"></textarea>
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary px-4" onclick="addReport()">Add Report</button>
        <button class="btn btn-outline-secondary" onclick="clearInput()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Reports list -->
  <div id="reportsSection" class="d-none mb-3">
    <div class="section-label d-flex justify-content-between align-items-center">
      <span id="reportsCount">Reports (0)</span>
      <button class="btn btn-sm btn-outline-danger" style="font-size:.72rem;padding:2px 10px" onclick="removeAll()">Remove all</button>
    </div>
    <div id="reportsList" class="d-flex flex-column gap-2"></div>
  </div>

  <!-- Trends & cross-validation -->
  <div id="trendsSection" class="d-none"></div>

</div>

<!-- Raw log fullscreen overlay -->
<div id="rawlog-overlay"
     style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);padding:1rem;box-sizing:border-box;align-items:stretch"
     onclick="if(event.target===this)closeRawLogOverlay()">
  <div style="background:#f5f4fb;border-radius:14px;flex:1;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;background:#fff;border-radius:14px 14px 0 0">
      <span style="font-weight:700;font-size:.82rem;color:#270697">Raw Console Log</span>
      <button onclick="closeRawLogOverlay()" class="btn btn-sm btn-outline-secondary" style="font-size:.72rem;padding:1px 10px">✕ Close</button>
    </div>
    <div id="rawlog-overlay-body" style="overflow-y:auto;flex:1;padding:.5rem"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  Thresholds
// ═══════════════════════════════════════════════════════
const T = {
  latencyGood: 50, latencyWarn: 100,
  jitterGood: 10,  jitterWarn: 30,
  pingGood: 20,    pingWarn: 50,
  lossWarn: 0.5,   lossBad: 2,
  mosGood: 4.0,    mosWarn: 3.5,
};

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
const reports = [];
let nextId = 0;
const chartInstances = {};

// ═══════════════════════════════════════════════════════
//  Status helpers
// ═══════════════════════════════════════════════════════
function statusOf(value, goodMax, warnMax) {
  if (value == null) return 'na';
  if (value <= goodMax) return 'ok';
  if (value <= warnMax) return 'warn';
  return 'bad';
}
function statusMOS(mos) {
  if (mos == null) return 'na';
  if (mos >= T.mosGood) return 'ok';
  if (mos >= T.mosWarn) return 'warn';
  return 'bad';
}
function worstStatus(...s) {
  if (s.includes('bad'))  return 'bad';
  if (s.includes('warn')) return 'warn';
  if (s.includes('ok'))   return 'ok';
  return 'na';
}
function getReportStatus(parsed) {
  const tips = buildTips(parsed);
  return tips.some(t => t.level === 'bad') ? 'bad'
       : tips.some(t => t.level === 'warn') ? 'warn'
       : 'ok';
}

// ═══════════════════════════════════════════════════════
//  Regex / section helpers
// ═══════════════════════════════════════════════════════
function tryMatch(text, ...patterns) {
  for (const p of patterns) { const m = text.match(p); if (m) return m; }
  return null;
}
function parseNum(text, ...patterns) {
  const m = tryMatch(text, ...patterns);
  return m ? parseFloat(m[1]) : null;
}
function getSection(text, ...keywords) {
  const lines = text.split('\n');
  let inside = false, out = [];
  for (const line of lines) {
    const up = line.toUpperCase();
    if (!inside && keywords.some(k => up.includes(k.toUpperCase()))) { inside = true; continue; }
    if (inside) {
      if (/─{8,}/.test(line)) break;
      out.push(line);
    }
  }
  return out.join('\n');
}

// ═══════════════════════════════════════════════════════
//  Timestamp helpers
// ═══════════════════════════════════════════════════════
function parseTimestamp(ts) {
  if (!ts) return null;
  const m = ts.match(/(\d{1,2})-(\d{1,2})-(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5], m[6] ? +m[6] : 0);
  return null;
}
function formatLabel(ts) {
  const d = parseTimestamp(ts);
  if (!d) return ts ?? '—';
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${d.getDate()} ${mo} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
//  Parser
// ═══════════════════════════════════════════════════════
function parseReport(raw) {
  const text = raw;

  const deviceType = tryMatch(text, /Type:\s*(.+)/i)?.[1]?.trim() ?? null;
  const deviceIP   = tryMatch(text, /IP\s+computer:\s*(.+)/i)?.[1]?.trim() ?? null;
  const tsMatch    = tryMatch(text, /Gegenereerd op\s+(.+)|Generated on\s+(.+)/i);
  const timestamp  = tsMatch?.[1]?.trim() ?? tsMatch?.[2]?.trim() ?? null;

  const latSec = getSection(text, 'VERBINDINGSSNELHEID', 'CONNECTION SPEED', 'BROWSER');
  function parseServer(name) {
    const re = new RegExp(name + ':\\s*(\\d+)\\s*ms\\s+(?:gemiddeld|average)\\s*\\(min\\s*(\\d+)\\s*[–\\-]\\s*max\\s*(\\d+)\\s*ms,\\s*jitter\\s*(\\d+)\\s*ms\\)', 'i');
    const m = tryMatch(latSec + '\n' + text, re);
    return m ? { avg: +m[1], min: +m[2], max: +m[3], jitter: +m[4] } : null;
  }
  const voys       = parseServer('Voys');
  const osso       = parseServer('OSSO');
  const cloudflare = parseServer('Cloudflare');

  const pingSec  = getSection(text, 'PING NAAR', 'PING TO', 'TERMINAL PING');
  const pingAvg  = parseNum(pingSec, /(?:Gemiddeld|Average):\s*(\d+)\s*ms/i);
  const pingMin  = parseNum(pingSec, /Minimum:\s*(\d+)\s*ms/i);
  const pingMax  = parseNum(pingSec, /Maximum:\s*(\d+)\s*ms/i);
  const pingLoss = parseNum(pingSec, /(?:Pakketverlies|Packet loss):\s*(\d+(?:\.\d+)?)\s*%/i);

  const natSec = getSection(text, 'DOUBLE-NAT');
  const cgnatDetected = (() => {
    const r = tryMatch(natSec + '\n' + text, /Resultaat:\s*(Geen CGNAT|CGNAT gedetecteerd|No CGNAT|CGNAT detected)/i);
    if (!r) return null;
    const v = r[1].toLowerCase();
    return v.includes('geen') || v.includes('no') ? false : true;
  })();
  const hopLines = (natSec.match(/Hop \d+:.+/gi) || []);
  const hopCount = hopLines.length;
  function isPrivateIP(ip) {
    const p = ip.split('.').map(Number);
    return p[0] === 10 || (p[0] === 172 && p[1] >= 16 && p[1] <= 31) || (p[0] === 192 && p[1] === 168);
  }
  const privateHopCount = hopLines.filter(l => { const m = l.match(/:\s*(\d+\.\d+\.\d+\.\d+)/); return m && isPrivateIP(m[1]); }).length;
  const doubleNatTraceroute = hopCount > 0 ? (privateHopCount >= 2) : null;

  const logSec = getSection(text, 'WEBPHONE CONSOLE LOG');
  const rawLog = logSec;

  // Extract session IDs — first from START/END pairs, then from END-only blocks
  const callSessionIds = {};
  const blockRe = /--- CALL (\d+) START ---([\s\S]*?)--- CALL \d+ END ---/gi;
  let bm;
  while ((bm = blockRe.exec(logSec)) !== null) {
    const sidM = bm[2].match(/sessionId:\s*'([^']+)'/);
    callSessionIds[+bm[1]] = sidM?.[1] ?? null;
  }
  // For END-only blocks (unanswered/missed calls): look backwards for a sessionId
  const logLines = logSec.split('\n');
  logLines.forEach((line, li) => {
    const em = line.trim().match(/^--- CALL (\d+) END ---/);
    if (!em || callSessionIds[+em[1]] != null) return;
    let startIdx = 0;
    for (let i = li - 1; i >= 0; i--) {
      if (/^--- CALL \d+ (?:START|END) ---/.test(logLines[i].trim())) { startIdx = i + 1; break; }
    }
    for (let i = startIdx; i < li; i++) {
      const sidM = logLines[i].match(/sessionId:\s*'([^']+)'/);
      if (sidM) { callSessionIds[+em[1]] = sidM[1]; return; }
    }
  });

  const callSec = getSection(text, 'GESPREKKEN', 'CALLS (');
  let avgMOS  = parseNum(callSec,
    /Gemiddelde MOS alle gesprekken:\s*(\d+\.\d+)/i,
    /Average MOS all calls:\s*(\d+\.\d+)/i,
    /Average MOS[^:]*:\s*(\d+\.\d+)/i
  );
  const callSrc     = callSec.trim() ? callSec : text;
  const callMatches = [...callSrc.matchAll(/(?:Gesprek|Call)\s+(\d+):\s*([^|]+?)\s*\|\s*(\w+)\s*\|\s*(?:Duur|Duration):\s*(\S+)\s*\|\s*MOS:\s*(\S+)/gi)];
  let calls = callMatches.map(m => ({
    n: +m[1], datetime: m[2]?.trim(), direction: m[3], duration: m[4],
    mos: m[5] === '?' ? null : parseFloat(m[5]),
    sessionId: callSessionIds[+m[1]] ?? null,
  }));

  // Event-based call detection for raw console logs (no structured CALLS section / no markers)
  if (calls.length === 0 && logSec.trim()) {
    const evSessions = new Map();
    function ensureSess(sid, li) {
      if (!evSessions.has(sid)) evSessions.set(sid, { firstLine: li });
      return evSessions.get(sid);
    }
    function parseEvTime(rawLine) {
      const s = rawLine.replace(/^\S+\.js:\d+\s+/, '');
      const usM = s.match(/^\[(\d{1,2})\/(\d{1,2})\/(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)\]/i);
      if (usM) {
        let h = +usM[4]; const pm = usM[7].toUpperCase() === 'PM';
        if (pm && h !== 12) h += 12; else if (!pm && h === 12) h = 0;
        return new Date(+usM[3], +usM[1]-1, +usM[2], h, +usM[5], +usM[6]);
      }
      const nlM = s.match(/^\[(\d{1,2})-(\d{1,2})-(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\]/);
      if (nlM) return new Date(+nlM[3], +nlM[2]-1, +nlM[1], +nlM[4], +nlM[5], +nlM[6]);
      return null;
    }
    logLines.forEach((rawLine, li) => {
      const line = rawLine.replace(/^\S+\.js:\d+\s+/, '');
      let m;
      if ((m = line.match(/receiving incoming call invitation.*?sessionId:\s*'([^']+)'/i)))
        { const s = ensureSess(m[1], li); s.direction = 'Incoming'; s.startLine = li; s.startTime = parseEvTime(rawLine); }
      if ((m = line.match(/outgoing session is accepted.*?sessionId:\s*'([^']+)'/i)))
        { const s = ensureSess(m[1], li); s.direction = 'Outgoing'; s.startLine = li; s.startTime = parseEvTime(rawLine); s.answered = true; }
      if ((m = line.match(/incoming session is accepted.*?sessionId:\s*'([^']+)'/i)))
        ensureSess(m[1], li).answered = true;
      if ((m = line.match(/(incoming|outgoing) call was terminated.*?sessionId:\s*'([^']+)'/i)))
        { const s = ensureSess(m[2], li); if (!s.direction) s.direction = m[1][0].toUpperCase() + m[1].slice(1); s.endLine = li; s.endTime = parseEvTime(rawLine); }
      if ((m = line.match(/MOS stats for terminated\s+(\S+)\s*-\s*average:([\d.]+)/i)))
        { const val = parseFloat(m[2]); ensureSess(m[1], li).mos = isNaN(val) ? null : val; }
      if ((m = line.match(/MOS stats for session:\s*(\S+)\s*-\s*average:([\d.]+)/i)))
        { const s = ensureSess(m[1], li); if (s.mos == null) { const val = parseFloat(m[2]); if (!isNaN(val)) s.mos = val; } }
    });
    const pad2 = v => String(v).padStart(2, '0');
    let n = 1;
    for (const [sid, s] of [...evSessions.entries()].sort((a, b) => a[1].firstLine - b[1].firstLine)) {
      const t = s.startTime || s.endTime;
      const datetime = t ? `${pad2(t.getDate())}-${pad2(t.getMonth()+1)}-${t.getFullYear()} ${pad2(t.getHours())}:${pad2(t.getMinutes())}:${pad2(t.getSeconds())}` : null;
      let duration = '?';
      if (s.startTime && s.endTime) {
        const secs = Math.round((s.endTime - s.startTime) / 1000);
        duration = `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
      }
      calls.push({ n: n++, datetime, direction: s.direction ?? 'Incoming', duration, mos: s.mos ?? null, sessionId: sid });
    }
    if (avgMOS == null) {
      const wm = calls.filter(c => c.mos != null);
      if (wm.length > 0) avgMOS = wm.reduce((a, c) => a + c.mos, 0) / wm.length;
    }
  }

  const sipSec   = getSection(text, 'SIP VERBINDING', 'SIP CONNECTION');
  const sipMatch = tryMatch(sipSec, /Resultaat:\s*(.+)|Result:\s*(.+)/i);
  const sipStatus = sipMatch ? (sipMatch[1] ?? sipMatch[2])?.trim() : null;
  const sipOK     = sipStatus ? sipStatus.includes('200') : null;
  const sipResp   = parseNum(sipSec, /(?:Reactietijd|Response time):\s*(\d+)\s*ms/i);
  const sipConn   = parseNum(sipSec, /(?:Verbindingstijd|Connection time):\s*(\d+)\s*ms/i);

  const sentryBlocked = /ERR_BLOCKED_BY_CLIENT/i.test(logSec);
  const iceFailed     = /ICE.*fail|ice.*failed/i.test(logSec);
  const soundFailed   = /sound.*failed|audio.*error|mediadevice.*error/i.test(logSec);
  const mosUndefined  = /MOS stats for terminated.*undefined/i.test(logSec);
  const sentryBlockCount = (logSec.match(/ERR_BLOCKED_BY_CLIENT/gi) || []).length;
  const clientIdMatch = (logSec + '\n' + text).match(/clientId:\s*(\d+)/i);
  const clientId = clientIdMatch ? +clientIdMatch[1] : null;
  const version  = tryMatch(text, /version:\s*'(v[\d.]+[^']*)'/)?.[ 1] ?? null;

  // ── Audio device extraction ──
  // Prefixes that indicate Windows virtual routing devices (problematic)
  const PROB_AUDIO_RE = /^(standaard|standard|communicatie|communications?|kommunikations?)\s*[-–]/i;
  const audioDevMap = new Map();
  function addAudioDev(name, kind) {
    if (!name?.trim() || audioDevMap.has(name)) return;
    audioDevMap.set(name, { name, kind, isProblematic: PROB_AUDIO_RE.test(name.trim()) });
  }
  for (const m of logSec.matchAll(/changed local setting "headsetInput" to:\s*\{"id":"[^"]*","name":"([^"]+)","kind":"(audioinput)"/gi))
    addAudioDev(m[1], 'audioinput');
  for (const m of logSec.matchAll(/changed local setting "headsetOutput" to:\s*\{"id":"[^"]*","name":"([^"]+)","kind":"(audiooutput)"/gi))
    addAudioDev(m[1], 'audiooutput');
  for (const m of logSec.matchAll(/\bsound\b[^\n{]*\{sink:\s*'([^']+)'/gi))
    addAudioDev(m[1], 'audiooutput');
  const audioDevices = [...audioDevMap.values()];
  const hasProblematicAudio = audioDevices.some(d => d.isProblematic);

  return {
    timestamp, deviceType, deviceIP, version,
    voys, osso, cloudflare,
    pingAvg, pingMin, pingMax, pingLoss,
    cgnatDetected, hopCount, doubleNatTraceroute, privateHopCount,
    calls, avgMOS,
    sipStatus, sipOK, sipResp, sipConn,
    sentryBlocked, sentryBlockCount, iceFailed, soundFailed, mosUndefined,
    clientId, rawLog, audioDevices, hasProblematicAudio,
  };
}

// ═══════════════════════════════════════════════════════
//  Tips engine
// ═══════════════════════════════════════════════════════
function buildTips(d) {
  const tips = [];

  if (d.sipOK === false) {
    tips.push({ level: 'bad', title: 'SIP Connection Failed', body:
      `The webphone could not connect to the Voys servers (result: ${d.sipStatus ?? 'unknown'}). ` +
      `Ask the customer to: <ul class="mb-0 mt-1">` +
      `<li>Check if a firewall is blocking VoIP traffic (ports 5060–5061 TCP/UDP and UDP 10000–20000).</li>` +
      `<li>Temporarily disable the firewall and retry.</li>` +
      `<li>Try a different network (e.g. mobile hotspot) to rule out ISP blocking.</li></ul>` });
  }

  if (d.iceFailed) {
    tips.push({ level: 'bad', title: 'WebRTC / ICE Connection Error', body:
      `ICE negotiation failed — the browser could not establish a media path. ` +
      `This often points to a strict firewall or CGNAT. ` +
      `Ask the customer to try a different network, or check if STUN/TURN ports are blocked.` });
  }

  if (d.pingLoss != null && d.pingLoss >= T.lossBad) {
    tips.push({ level: 'bad', title: `High Packet Loss: ${d.pingLoss}%`, body:
      `Packets are being lost — this directly causes choppy or broken audio. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Restart the modem and router (unplug for 30 seconds).</li>` +
      `<li>Try a wired ethernet connection instead of WiFi.</li>` +
      `<li>Check all network cables for damage.</li>` +
      `<li>If it persists, the customer should contact their ISP.</li></ul>` });
  } else if (d.pingLoss != null && d.pingLoss > 0) {
    tips.push({ level: 'warn', title: `Minor Packet Loss: ${d.pingLoss}%`, body:
      `A small number of packets are being dropped. May cause occasional glitches. ` +
      `Recommend restarting the router and using a wired connection.` });
  }

  const terminalPingOK = d.pingAvg != null && d.pingAvg <= T.pingGood && (d.pingLoss == null || d.pingLoss === 0);

  if (d.voys != null) {
    if (d.voys.avg > T.latencyWarn) {
      if (terminalPingOK) {
        tips.push({ level: 'info', title: `Browser Latency to Voys: ${d.voys.avg} ms (not critical)`, body:
          `Browser measured high latency (${d.voys.avg} ms) but the terminal ping is excellent ` +
          `(${d.pingAvg} ms, 0% loss). This discrepancy is usually browser overhead, not a real network issue. ` +
          `No action needed unless the customer reports actual call problems.` });
      } else {
        tips.push({ level: 'bad', title: `High Latency to Voys: ${d.voys.avg} ms`, body:
          `The connection to Voys servers is very slow. ` +
          `<ul class="mb-0 mt-1">` +
          `<li>Is the customer using a <strong>VPN</strong>? VPNs can add 50–200 ms — try disabling it.</li>` +
          `<li>Recommend switching to a <strong>wired ethernet</strong> connection.</li>` +
          `<li>Check for other applications consuming bandwidth (streaming, large downloads).</li></ul>` });
      }
    } else if (d.voys.avg > T.latencyGood && !terminalPingOK) {
      tips.push({ level: 'warn', title: `Elevated Latency to Voys: ${d.voys.avg} ms`, body:
        `Latency is somewhat elevated. Calls may still work fine, but quality could be affected under load. ` +
        `Suggest a wired connection for a more stable experience.` });
    }
  }

  const worstJitter = Math.max(d.voys?.jitter ?? 0, d.osso?.jitter ?? 0, d.cloudflare?.jitter ?? 0);
  if (!terminalPingOK) {
    if (worstJitter > T.jitterWarn) {
      tips.push({ level: 'bad', title: `High Jitter: ${worstJitter} ms`, body:
        `Unstable connection — typically causes robotic or choppy audio. ` +
        `<ul class="mb-0 mt-1">` +
        `<li>Switch to a <strong>wired ethernet connection</strong> — WiFi jitter is the #1 cause of VoIP issues.</li>` +
        `<li>Restart the router and modem.</li>` +
        `<li>Move closer to the router if WiFi must be used.</li>` +
        `<li>Check for wireless interference (microwaves, cordless phones, neighboring networks).</li></ul>` });
    } else if (worstJitter > T.jitterGood) {
      tips.push({ level: 'warn', title: `Moderate Jitter: ${worstJitter} ms`, body:
        `Some network instability detected. A wired connection is recommended for the best call quality.` });
    }
  }

  if (d.doubleNatTraceroute === true) {
    tips.push({ level: 'warn', title: `Double NAT Detected (${d.privateHopCount} private hops in traceroute)`, body:
      `The traceroute shows multiple private IP hops — the customer is behind two NAT layers. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Ask if they have a modem <em>and</em> a separate router — both doing NAT is a common cause.</li>` +
      `<li>Put the ISP modem in <strong>bridge/passthrough mode</strong> so only one device does NAT.</li>` +
      `<li>Alternatively, contact the ISP and request a <strong>public IP address</strong>.</li>` +
      `<li>Ask if the ISP modem has a <strong>SIP ALG</strong> setting — if so, disable it.</li></ul>` });
  } else if (d.doubleNatTraceroute === null && d.cgnatDetected === true) {
    tips.push({ level: 'warn', title: 'CGNAT Detected', body:
      `The customer appears to be behind CGNAT — their ISP shares a public IP across multiple customers. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Advise the customer to contact their ISP and request a <strong>dedicated public IP</strong>.</li>` +
      `<li>Ask if the ISP modem has a <strong>SIP ALG</strong> setting — if so, disable it.</li></ul>` });
  }

  if (d.avgMOS != null && d.avgMOS < T.mosWarn) {
    tips.push({ level: 'bad', title: `Poor Call Quality (MOS ${d.avgMOS.toFixed(2)})`, body:
      `Average call quality score is low (below 3.5 is considered poor). ` +
      `Look at latency, jitter and packet loss metrics to find the root cause.` });
  } else if (d.avgMOS != null && d.avgMOS < T.mosGood) {
    tips.push({ level: 'warn', title: `Fair Call Quality (MOS ${d.avgMOS.toFixed(2)})`, body:
      `Call quality is acceptable but not optimal. A wired connection may improve the score.` });
  }

  if (d.mosUndefined) {
    tips.push({ level: 'info', title: 'Call Without Quality Data', body:
      `One or more calls ended before MOS data could be collected. Usually a very short call or rejected before connecting.` });
  }

  if (d.hasProblematicAudio) {
    const badNames = [...new Set(d.audioDevices.filter(a => a.isProblematic).map(a => `<strong>${escHtml(a.name)}</strong>`))]
      .join(', ');
    tips.push({ level: 'warn', title: 'Problematic Audio Device Detected', body:
      `The webphone is using a Windows virtual audio device: ${badNames}. ` +
      `"Standaard" (Default) and "Communicatie" (Communications) are not real hardware — ` +
      `Windows routes audio through them unpredictably, which often causes wrong-device routing or no audio. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Open webphone settings <strong>(gear → Audio)</strong>.</li>` +
      `<li>Select the actual headset or microphone by its real name for both input and output.</li>` +
      `<li>Avoid anything starting with "Standaard", "Communicatie", "Standard" or "Communications".</li>` +
      `</ul>` });
  }

  if (d.soundFailed) {
    tips.push({ level: 'bad', title: 'Audio Device Error Detected', body:
      `The console log shows an audio device error. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Check that the headset/microphone is properly connected.</li>` +
      `<li>Select the correct audio device in webphone settings (gear → Audio).</li>` +
      `<li>Try unplugging and re-plugging the headset.</li>` +
      `<li>Test the audio device in another application to confirm it works.</li></ul>` });
  }

  if (d.sentryBlocked) {
    tips.push({ level: 'info', title: 'Error Reporting Blocked (Ad Blocker)', body:
      `Sentry is blocked (${d.sentryBlockCount}×) — caused by an ad blocker or privacy extension. ` +
      `<strong>Not critical</strong> and does not affect call quality. You can ignore this.` });
  }

  if (tips.length === 0) {
    tips.push({ level: 'ok', title: 'Everything Looks Good', body:
      `All metrics are within normal ranges. If the customer still experiences issues, ` +
      `collect a new report during an active problem or check during peak usage hours.` });
  }

  return tips;
}

// ═══════════════════════════════════════════════════════
//  HTML helpers
// ═══════════════════════════════════════════════════════
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dot(s) { return `<span class="dot dot-${s} me-1"></span>`; }

function metricCard(title, value, status, sub) {
  const s = status ?? 'na';
  return `<div class="metric-card">
    <div class="metric-title">${title}</div>
    <div class="d-flex align-items-center gap-2">
      <span class="dot dot-${s}"></span>
      <span class="metric-value">${value}</span>
    </div>
    ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
  </div>`;
}

function serverCard(name, data) {
  if (!data) return `<div class="col-6 col-md-4">${metricCard(name, '—', 'na', 'No data')}</div>`;
  const ls = statusOf(data.avg, T.latencyGood, T.latencyWarn);
  const js = statusOf(data.jitter, T.jitterGood, T.jitterWarn);
  return `<div class="col-6 col-md-4">${metricCard(name, data.avg + ' ms avg', worstStatus(ls, js), `min ${data.min} · max ${data.max} · jitter ${data.jitter} ms`)}</div>`;
}

// ═══════════════════════════════════════════════════════
//  Build individual report HTML (returns string)
// ═══════════════════════════════════════════════════════
function buildIndividualHtml(d, reportId) {
  const tips   = buildTips(d);
  const status = tips.some(t => t.level === 'bad') ? 'bad' : tips.some(t => t.level === 'warn') ? 'warn' : 'ok';
  const icons  = { ok:'✅', warn:'⚠️', bad:'❌' };
  const labels = { ok:'No issues found.', warn:'Some issues — see tips below.', bad:'Critical issues — action required.' };
  const stLabels = { ok:'All Good', warn:'Warnings Found', bad:'Issues Detected' };

  let h = `<div class="p-3">`;

  // Overall + portal button
  h += `<div class="overall-bar overall-${status} mb-3">
    <span style="font-size:1.3rem;line-height:1">${icons[status]}</span>
    <div class="flex-grow-1">
      <div class="fw-bold" style="font-size:.9rem">${stLabels[status]}</div>
      <div style="font-size:.78rem;opacity:.8">${labels[status]}</div>
    </div>
    ${d.clientId ? `<a href="https://partner.voys.co/client/${d.clientId}" target="_blank" rel="noopener" class="btn btn-primary btn-sm text-nowrap">Open in portal →</a>` : ''}
  </div>`;

  // Device info
  h += `<div class="section-label">Device &amp; Report Info</div>
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">${metricCard('Device Type', d.deviceType ?? '—')}</div>
    <div class="col-6 col-md-3">${metricCard('IP Address', d.deviceIP ?? 'Not determined')}</div>
    <div class="col-6 col-md-3">${metricCard('Version', d.version ?? '—')}</div>
    <div class="col-6 col-md-3">${metricCard('Generated', d.timestamp ?? '—')}</div>
  </div>`;

  // Browser latency
  h += `<div class="section-label">Browser Latency (Ping to Servers)</div>
  <div class="row g-2 mb-3">
    ${serverCard('Voys', d.voys)}${serverCard('OSSO', d.osso)}${serverCard('Cloudflare', d.cloudflare)}
  </div>`;

  // Terminal ping
  h += `<div class="section-label">Terminal Ping (ha.voys.nl)</div>
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">${metricCard('Avg Ping', d.pingAvg != null ? d.pingAvg+' ms' : '—', statusOf(d.pingAvg, T.pingGood, T.pingWarn), d.pingMin != null ? `min ${d.pingMin} · max ${d.pingMax} ms` : '')}</div>
    <div class="col-6 col-md-3">${metricCard('Packet Loss', d.pingLoss != null ? d.pingLoss+'%' : '—', statusOf(d.pingLoss, T.lossWarn, T.lossBad))}</div>
  </div>`;

  // NAT
  const ns = d.doubleNatTraceroute === true ? 'warn' : d.doubleNatTraceroute === false ? 'ok' : d.cgnatDetected === true ? 'warn' : d.cgnatDetected === false ? 'ok' : 'na';
  const nl = d.doubleNatTraceroute === true  ? `Double NAT (${d.privateHopCount} private hops)`
           : d.doubleNatTraceroute === false  ? 'No Double NAT ✓'
           : d.cgnatDetected === true          ? 'CGNAT Detected'
           : d.cgnatDetected === false         ? 'No CGNAT ✓' : '—';
  h += `<div class="section-label">Network / NAT</div>
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">${metricCard('Double NAT', nl, ns, d.hopCount > 0 ? `Traceroute: ${d.hopCount} hops` : null)}</div>
  </div>`;

  // Calls table
  h += `<div class="section-label">Call Quality (MOS)</div>`;
  if (d.calls.length > 0) {
    h += `<div class="card mb-3"><div class="table-responsive">
    <table class="table table-sm table-hover mb-0" style="font-size:.84rem">
      <thead><tr style="font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;border-bottom:2px solid rgba(0,0,0,.08)">
        <th class="ps-3" style="width:2rem">#</th><th style="width:5.5rem">Time</th>
        <th>Direction</th><th>Duration</th><th>MOS</th><th>Quality</th>
      </tr></thead><tbody>`;
    d.calls.forEach(c => {
      const out = c.direction === 'Uitgaand' || c.direction.toLowerCase().includes('out');
      const t   = (() => { if (!c.datetime || /^\?/.test(c.datetime.trim())) return '—'; const p = c.datetime.trim().split(' '); return p.length >= 2 ? p[1] : c.datetime.trim(); })();
      const ms  = statusMOS(c.mos);
      const ql  = c.mos != null ? (c.mos >= 4 ? 'Excellent' : c.mos >= 3.5 ? 'Good' : c.mos >= 3 ? 'Fair' : 'Poor')
                : c.duration === '?' ? 'Missed' : 'No data';
      h += `<tr>
        <td class="ps-3 text-muted fw-semibold">${c.n}</td>
        <td class="text-muted">${t}</td>
        <td><span style="opacity:.4">${out ? '↗' : '↙'}</span> ${out ? 'Outgoing' : 'Incoming'}</td>
        <td>${c.duration !== '?' ? c.duration : '—'}</td>
        <td><span class="dot dot-${ms} me-1"></span><strong>${c.mos != null ? c.mos.toFixed(2) : '—'}</strong></td>
        <td><span class="status-badge badge-${ms}" style="padding:2px 8px;font-size:.68rem">${ql}</span></td>
      </tr>`;
    });
    if (d.avgMOS != null) {
      const s = statusMOS(d.avgMOS);
      h += `<tr style="border-top:2px solid rgba(0,0,0,.08)">
        <td class="ps-3" colspan="4" style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;vertical-align:middle">Average MOS</td>
        <td><span class="dot dot-${s} me-1"></span><strong>${d.avgMOS.toFixed(2)}</strong></td>
        <td style="font-size:.7rem;color:#6c757d">Scale 1–5</td>
      </tr>`;
    }
    h += `</tbody></table></div></div>`;
  } else {
    h += `<div class="row g-2 mb-3"><div class="col-6 col-md-3">${metricCard('Average MOS', d.avgMOS != null ? d.avgMOS.toFixed(2) : '—', statusMOS(d.avgMOS), 'Scale: 1–5')}</div></div>`;
  }

  // SIP
  const sl = d.sipOK === true ? 'ok' : d.sipOK === false ? 'bad' : 'na';
  h += `<div class="section-label">SIP Connection Test</div>
  <div class="row g-2 mb-3">
    <div class="col-6 col-md-3">${metricCard('Result', d.sipStatus ?? '—', sl)}</div>
    <div class="col-6 col-md-3">${metricCard('Response Time', d.sipResp != null ? d.sipResp+' ms' : '—')}</div>
    <div class="col-6 col-md-3">${metricCard('Connection Time', d.sipConn != null ? d.sipConn+' ms' : '—')}</div>
  </div>`;

  // Audio devices (webphone only)
  if (d.audioDevices?.length > 0) {
    h += `<div class="section-label">Audio Devices</div>
    <div class="card mb-3"><div class="table-responsive">
    <table class="table table-sm mb-0" style="font-size:.82rem">
      <thead><tr style="font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;border-bottom:2px solid rgba(0,0,0,.08)">
        <th class="ps-3" style="width:4.5rem">Type</th>
        <th>Device Name</th>
        <th style="width:6rem">Status</th>
      </tr></thead><tbody>`;
    d.audioDevices.forEach(dev => {
      const kindLabel = dev.kind === 'audioinput' ? 'Microphone' : 'Speaker';
      const s = dev.isProblematic ? 'warn' : 'ok';
      const sl = dev.isProblematic ? 'Avoid' : 'OK';
      h += `<tr>
        <td class="ps-3 text-muted">${kindLabel}</td>
        <td style="font-family:'Courier New',monospace;font-size:.78rem">${escHtml(dev.name)}</td>
        <td><span class="status-badge badge-${s}" style="padding:2px 8px;font-size:.68rem">${sl}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div></div>`;
  }

  // Console log notes
  const logItems = [
    d.iceFailed     && { s:'bad',  t:'ICE failure in log' },
    d.soundFailed   && { s:'bad',  t:'Audio device error' },
    d.mosUndefined  && { s:'warn', t:'Call with no MOS data' },
    d.sentryBlocked && { s:'info', t:`Sentry blocked ×${d.sentryBlockCount}` },
  ].filter(Boolean);
  if (logItems.length > 0) {
    h += `<div class="section-label">Console Log</div><div class="d-flex flex-wrap gap-2 mb-3">`;
    logItems.forEach(i => { h += `<span class="status-badge badge-${i.s}">${dot(i.s)}${i.t}</span>`; });
    h += `</div>`;
  }

  // Tips
  h += `<div class="section-label">Customer Tips</div>`;
  tips.forEach(tip => {
    const lvl = { bad:'Action required', warn:'Attention', info:'Note', ok:'All good' }[tip.level];
    h += `<div class="tip-card tip-${tip.level}"><div class="tip-label">${lvl}</div>
      <div class="fw-semibold" style="font-size:.875rem;margin-top:2px">${tip.title}</div>
      <div class="tip-body text-muted">${tip.body}</div></div>`;
  });

  // Raw log viewer (webphone only)
  if (d.rawLog?.trim()) {
    const uid = `rawlog-${reportId ?? Date.now()}`;
    h += `<div class="section-label d-flex justify-content-between align-items-center mt-3">
      <span>Raw Console Log</span>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary" style="font-size:.7rem;padding:1px 10px"
                onclick="toggleElement('${uid}')">Show / Hide</button>
        <button class="btn btn-sm btn-outline-secondary" style="font-size:.7rem;padding:1px 10px"
                onclick="openRawLogOverlay('${uid}')">&#x2922; Expand</button>
      </div>
    </div>
    <div id="${uid}" class="d-none mb-3">${buildRawLogHtml(d.rawLog)}</div>`;
  }

  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
//  Reports list renderer
// ═══════════════════════════════════════════════════════
function renderReportsList() {
  const section = document.getElementById('reportsSection');
  const list    = document.getElementById('reportsList');

  if (reports.length === 0) { section.classList.add('d-none'); return; }
  section.classList.remove('d-none');
  document.getElementById('reportsCount').textContent = `Added Reports (${reports.length})`;

  // Preserve open/closed state of existing rows
  const openIds = new Set(
    reports.map(r => r.id).filter(id => {
      const el = document.getElementById(`detail-${id}`);
      return el && !el.classList.contains('d-none');
    })
  );

  const stLabels = { ok:'All Good', warn:'Warnings', bad:'Issues' };

  list.innerHTML = reports.map(r => {
    const label      = `${r.parsed.deviceType ?? 'Unknown'} · ${formatLabel(r.parsed.timestamp)}`;
    const clientInfo = r.parsed.clientId ? ` <span style="opacity:.5">· ID ${r.parsed.clientId}</span>` : '';
    const isOpen     = openIds.has(r.id);
    return `<div class="report-row fade-in" id="row-${r.id}">
      <div class="report-row-header" onclick="toggleReport(${r.id})">
        <span class="dot dot-${r.status}" style="width:10px;height:10px"></span>
        <span class="flex-grow-1 fw-semibold" style="font-size:.85rem">${label}${clientInfo}</span>
        <span class="status-badge badge-${r.status}" style="font-size:.68rem;padding:2px 10px">${stLabels[r.status]}</span>
        <button class="btn-icon btn btn-outline-secondary" id="toggle-btn-${r.id}"
                onclick="event.stopPropagation();toggleReport(${r.id})" title="Expand / collapse">${isOpen ? '▲' : '▼'}</button>
        <button class="btn-icon btn btn-outline-danger"
                onclick="event.stopPropagation();deleteReport(${r.id})" title="Remove">✕</button>
      </div>
      <div class="${isOpen ? '' : 'd-none'} report-row-detail" id="detail-${r.id}">
        ${buildIndividualHtml(r.parsed, r.id)}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  Trends & cross-validation
// ═══════════════════════════════════════════════════════
function renderTrendsSection() {
  const section = document.getElementById('trendsSection');
  if (reports.length === 0) { section.classList.add('d-none'); section.innerHTML = ''; return; }

  const sorted = [...reports].sort((a, b) => {
    const ta = parseTimestamp(a.parsed.timestamp), tb = parseTimestamp(b.parsed.timestamp);
    return (ta && tb) ? ta - tb : 0;
  });

  const allCalls     = collectAllUniqueCalls();
  const callsWithMOS = allCalls.filter(c => c.mos != null);
  const hasMultiRep  = reports.length >= 2;
  const hasCallMOS   = callsWithMOS.length >= 2;

  if (!hasMultiRep && !hasCallMOS) { section.classList.add('d-none'); section.innerHTML = ''; return; }
  section.classList.remove('d-none');

  let html = '';

  // Cross-validation (≥2 reports)
  if (hasMultiRep) html += buildCrossValidationHtml(sorted);

  // Trend line charts (≥2 reports)
  const trendLabels = hasMultiRep ? sorted.map(r => formatLabel(r.parsed.timestamp)) : [];
  if (hasMultiRep) {
    html += `<div class="section-label mt-3">Trends Over Time</div>
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6"><div class="card chart-card" id="wrap-latency">
        <div class="chart-title">Latency — Voys (ms)</div>
        <canvas id="chartLatency"></canvas>
      </div></div>
      <div class="col-12 col-md-6"><div class="card chart-card" id="wrap-jitter">
        <div class="chart-title">Jitter — worst (ms)</div>
        <canvas id="chartJitter"></canvas>
      </div></div>
      <div class="col-12 col-md-6"><div class="card chart-card" id="wrap-sip">
        <div class="chart-title">SIP Response Time (ms)</div>
        <canvas id="chartSIP"></canvas>
      </div></div>
      <div class="col-12 col-md-6"><div class="card chart-card" id="wrap-mos">
        <div class="chart-title">Average MOS Per Report</div>
        <canvas id="chartMOS"></canvas>
      </div></div>
    </div>`;
  }

  // Per-call MOS bar chart (≥2 unique calls with MOS data)
  if (hasCallMOS) {
    const cnt   = callsWithMOS.length;
    const title = hasMultiRep
      ? `${cnt} call${cnt !== 1 ? 's' : ''} across ${reports.length} reports`
      : `${cnt} call${cnt !== 1 ? 's' : ''}`;
    html += `<div class="section-label mt-3">Per-Call MOS</div>
    <div class="row g-3 mb-4">
      <div class="col-12"><div class="card chart-card" id="wrap-callmos">
        <div class="chart-title">Call Quality — MOS (${title})</div>
        <canvas id="chartCallMOS"></canvas>
      </div></div>
    </div>`;
  }

  section.innerHTML = html;
  if (hasMultiRep) renderCharts(sorted, trendLabels);
  if (hasCallMOS)  renderCallMOSChart(callsWithMOS);
}

function buildCrossValidationHtml(sorted) {
  const issues = [];

  // ClientId check (webphone)
  const withCid = sorted.filter(r => r.parsed.clientId);
  if (withCid.length >= 2) {
    const unique = [...new Set(withCid.map(r => r.parsed.clientId))];
    if (unique.length > 1) {
      issues.push({ level: 'bad', msg:
        `Reports have <strong>different Client IDs</strong> (${unique.join(', ')}) — these reports may not be from the same customer!` });
    }
  }

  // IP check (hardphone / devices where IP is determined)
  const validIP = r => {
    const ip = r.parsed.deviceIP;
    return ip && !/niet|not\s+det/i.test(ip) && ip !== '—' && /\d+\.\d+/.test(ip);
  };
  const withIP = sorted.filter(validIP);
  if (withIP.length >= 2) {
    const unique = [...new Set(withIP.map(r => r.parsed.deviceIP.trim()))];
    if (unique.length > 1) {
      const subnets = [...new Set(unique.map(ip => ip.split('.').slice(0,3).join('.')))];
      if (subnets.length > 1) {
        issues.push({ level: 'bad', msg:
          `Reports have IP addresses from <strong>different subnets</strong> (${unique.join(', ')}). These reports may be from different customers or locations!` });
      } else {
        issues.push({ level: 'warn', msg:
          `Reports have different IP addresses (${unique.join(', ')}) but are on the same /24 subnet. Likely the same customer, possibly different devices.` });
      }
    }
  }

  if (issues.length === 0) {
    return `<div class="d-flex align-items-center gap-2 mb-3 px-3 py-2 rounded" style="background:rgba(25,135,84,.08);border:1px solid rgba(25,135,84,.2);font-size:.82rem">
      <span class="dot dot-ok"></span>
      <span class="fw-semibold" style="color:#157347">All reports appear to be from the same customer.</span>
    </div>`;
  }

  return issues.map(i => `<div class="tip-card tip-${i.level} mb-2" style="font-size:.84rem">
    <div class="tip-label">${i.level === 'bad' ? 'Warning' : 'Note'}</div>
    <div class="tip-body">${i.msg}</div>
  </div>`).join('');
}

// ═══════════════════════════════════════════════════════
//  Chart.js — threshold line plugin
// ═══════════════════════════════════════════════════════
const thresholdPlugin = {
  id: 'thresholds',
  afterDraw(chart) {
    const lines = chart.options._thresholds;
    if (!lines?.length) return;
    const { ctx, chartArea, scales: { y } } = chart;
    lines.forEach(({ value, color }) => {
      const yPx = y.getPixelForValue(value);
      if (yPx < chartArea.top - 1 || yPx > chartArea.bottom + 1) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.setLineDash([5, 4]);
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(chartArea.left, yPx);
      ctx.lineTo(chartArea.right, yPx);
      ctx.stroke();
      ctx.restore();
    });
  }
};

function makeChart(id, wrapId, labels, data, color, fillColor, unit, thresholds, yMin, yMax) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }

  const wrap = document.getElementById(wrapId);
  if (!data.some(v => v != null)) { if (wrap) wrap.style.display = 'none'; return; }
  if (wrap) wrap.style.display = '';

  chartInstances[id] = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: color,
        backgroundColor: fillColor,
        borderWidth: 2,
        tension: 0.35,
        pointRadius: 5,
        pointHoverRadius: 8,
        pointBackgroundColor: color,
        fill: true,
        spanGaps: true,
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y != null ? `${ctx.parsed.y}${unit ? ' '+unit : ''}` : 'No data'
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10, family: 'Montserrat, sans-serif' }, maxRotation: 25 }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10, family: 'Montserrat, sans-serif' }, callback: v => v + (unit ? ' '+unit : '') },
          min: yMin ?? 0,
          ...(yMax != null ? { max: yMax } : {}),
        }
      },
      _thresholds: thresholds || [],
    },
    plugins: [thresholdPlugin],
  });
}

function renderCharts(sorted, labels) {
  makeChart('chartLatency', 'wrap-latency', labels,
    sorted.map(r => r.parsed.voys?.avg ?? null),
    '#270697', 'rgba(39,6,151,0.08)', 'ms',
    [{ value: T.latencyGood, color: 'rgba(25,135,84,0.45)' },
     { value: T.latencyWarn, color: 'rgba(255,193,7,0.65)' }]
  );

  makeChart('chartJitter', 'wrap-jitter', labels,
    sorted.map(r => Math.max(r.parsed.voys?.jitter ?? 0, r.parsed.osso?.jitter ?? 0, r.parsed.cloudflare?.jitter ?? 0) || null),
    '#f97316', 'rgba(249,115,22,0.08)', 'ms',
    [{ value: T.jitterGood, color: 'rgba(25,135,84,0.45)' },
     { value: T.jitterWarn, color: 'rgba(255,193,7,0.65)' }]
  );

  makeChart('chartSIP', 'wrap-sip', labels,
    sorted.map(r => r.parsed.sipResp ?? null),
    '#0891b2', 'rgba(8,145,178,0.08)', 'ms'
  );

  makeChart('chartMOS', 'wrap-mos', labels,
    sorted.map(r => r.parsed.avgMOS ?? null),
    '#059669', 'rgba(5,150,105,0.08)', '',
    [{ value: T.mosWarn, color: 'rgba(255,193,7,0.65)' },
     { value: T.mosGood, color: 'rgba(25,135,84,0.45)' }],
    1, 5
  );
}

// ═══════════════════════════════════════════════════════
//  Per-call MOS bar chart
// ═══════════════════════════════════════════════════════
function makeBarChart(id, wrapId, labels, data, colors, yMin, yMax, thresholds) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  const wrap = document.getElementById(wrapId);
  if (!data.some(v => v != null)) { if (wrap) wrap.style.display = 'none'; return; }
  if (wrap) wrap.style.display = '';
  chartInstances[id] = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: colors.map(c => c.replace('.75)', '1)')),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y != null ? `MOS: ${ctx.parsed.y.toFixed(2)}` : 'No data' } }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 9, family: 'Montserrat, sans-serif' }, maxRotation: 45 }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10, family: 'Montserrat, sans-serif' } },
          min: yMin ?? 0,
          ...(yMax != null ? { max: yMax } : {}),
        }
      },
      _thresholds: thresholds ?? [],
    },
    plugins: [thresholdPlugin],
  });
}

function callDedupeKey(c) {
  if (c.sessionId) return 'sid:' + c.sessionId;
  return 'dt:' + (c.datetime ?? '?') + '|' + (c.direction ?? '?');
}

function collectAllUniqueCalls() {
  const seen = new Set();
  const result = [];
  for (const r of reports) {
    for (const c of r.parsed.calls) {
      const key = callDedupeKey(c);
      if (!seen.has(key)) { seen.add(key); result.push(c); }
    }
  }
  return result;
}

function renderCallMOSChart(callsWithMOS) {
  const labels = callsWithMOS.map(c => {
    const parts = (c.datetime ?? '').trim().split(/\s+/);
    const time  = parts.length >= 2 ? parts[1] : (parts[0] ?? '?');
    const dir   = c.direction === 'Uitgaand' || /out/i.test(c.direction ?? '') ? '↗' : '↙';
    return dir + ' ' + time;
  });
  const data   = callsWithMOS.map(c => c.mos);
  const colors = callsWithMOS.map(c =>
    c.mos >= T.mosGood ? 'rgba(5,150,105,.75)' :
    c.mos >= T.mosWarn ? 'rgba(217,119,6,.75)' :
                         'rgba(220,53,69,.75)'
  );
  makeBarChart('chartCallMOS', 'wrap-callmos', labels, data, colors, 1, 5, [
    { value: T.mosWarn, color: 'rgba(255,193,7,0.65)' },
    { value: T.mosGood, color: 'rgba(25,135,84,0.45)' },
  ]);
}

// ═══════════════════════════════════════════════════════
//  Raw log viewer
// ═══════════════════════════════════════════════════════
function buildRawLogHtml(rawLog) {
  if (!rawLog?.trim()) return '';

  const DEVICE_LINE_RE = /changed local setting "headset(?:Input|Output)"|setting headset(?:Input|Output) for future|changed headset sink to:/i;
  const FILE_PFX_RE   = /^\S+\.js:\d+\s+/;
  const TS_RE         = /^(\[\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4},\s*[\d:]+(?:\s*[AP]M)?\])\s*/i;
  const CTRL_HDR_RE   = /^\s*(?:Output|Input)\s+Report\s+\d+\s*\([^)]+\)\s*$/i;
  const CTRL_STS_RE   = /^\s{8,}(?:HOOK\s+(?:ON|OFF)(?:\s+STATUS)?|IGNORED)\s*$/i;

  const lines = rawLog.split('\n');

  // 1. Explicit --- CALL N START/END --- block detection
  const blocks = new Map();
  lines.forEach((line, i) => {
    const sm = line.trim().match(/^--- CALL (\d+) START ---/);
    const em = line.trim().match(/^--- CALL (\d+) END ---/);
    if (sm) { const b = blocks.get(+sm[1]) ?? {}; b.start = i; blocks.set(+sm[1], b); }
    if (em) { const b = blocks.get(+em[1]) ?? {}; b.end   = i; blocks.set(+em[1], b); }
  });

  // END-only blocks: look for 'receiving incoming call invitation' as start
  [...blocks.entries()]
    .sort((a, b) => (a[1].end ?? 0) - (b[1].end ?? 0))
    .forEach(([, block], idx, arr) => {
      if (block.start == null && block.end != null) {
        const prevEnd = idx > 0 ? (arr[idx-1][1].end ?? -1) : -1;
        let found = -1;
        for (let i = prevEnd + 1; i < block.end; i++) {
          if (/receiving incoming call invitation/i.test(lines[i])) { found = i; break; }
        }
        block.start = found >= 0 ? found : prevEnd + 1;
      }
    });

  // 2. Fallback: sessionId-based block detection (Mac / no-marker logs)
  if (blocks.size === 0) {
    const sidMap = new Map();
    function ensureBlock(sid, li) {
      if (!sidMap.has(sid)) sidMap.set(sid, { first: li });
      return sidMap.get(sid);
    }
    lines.forEach((rawLine, li) => {
      const line = rawLine.replace(FILE_PFX_RE, '');
      let m;
      if ((m = line.match(/receiving incoming call invitation.*?sessionId:\s*'([^']+)'/i)))
        { const b = ensureBlock(m[1], li); if (b.start == null) b.start = li; }
      if ((m = line.match(/outgoing session is accepted.*?sessionId:\s*'([^']+)'/i)))
        { const b = ensureBlock(m[1], li); if (b.start == null) b.start = li; }
      if ((m = line.match(/(incoming|outgoing) call was terminated.*?sessionId:\s*'([^']+)'/i)))
        { const b = ensureBlock(m[2], li); b.end = li; }
      if ((m = line.match(/MOS stats for (?:terminated|session:)\s*(\S+)/i)))
        { const b = ensureBlock(m[1], li); b.end = Math.max(b.end ?? li, li); }
    });
    [...sidMap.entries()]
      .sort((a, b) => a[1].first - b[1].first)
      .forEach(([, b], idx) => {
        if (b.start != null && b.end != null) blocks.set(idx + 1, { start: b.start, end: b.end });
      });
  }

  // 3. Assign lineCall[i] = call number or null
  const lineCall = new Array(lines.length).fill(null);
  blocks.forEach((block, n) => {
    if (block.start != null && block.end != null)
      for (let i = block.start; i <= block.end; i++) lineCall[i] = n;
  });

  // 4. Build visual groups: 'plain' | 'call' | 'ctrl'
  //    Call-control blocks are detected by CTRL_HDR_RE header + following rows/status lines
  const groups = [];
  let i = 0;
  while (i < lines.length) {
    const stripped = lines[i].replace(FILE_PFX_RE, '');

    if (CTRL_HDR_RE.test(stripped)) {
      const ctrlLines = [lines[i]];
      let j = i + 1;
      while (j < lines.length) {
        const raw = lines[j];
        const hasPrefix = FILE_PFX_RE.test(raw);
        if (!hasPrefix && /^ *\d+ /.test(raw)) {          // numbered row without prefix
          ctrlLines.push(raw); j++;
        } else if (hasPrefix && CTRL_STS_RE.test(raw.replace(FILE_PFX_RE, ''))) {
          ctrlLines.push(raw); j++;                        // HOOK ON/OFF / IGNORED status
        } else break;
      }
      groups.push({ type: 'ctrl', callN: lineCall[i], lines: ctrlLines });
      i = j;
      continue;
    }

    const cn = lineCall[i];
    let j = i + 1;
    while (j < lines.length && lineCall[j] === cn) {
      if (CTRL_HDR_RE.test(lines[j].replace(FILE_PFX_RE, ''))) break;
      j++;
    }
    groups.push({ type: cn === null ? 'plain' : 'call', callN: cn, lines: lines.slice(i, j) });
    i = j;
  }

  // 5. Render a single line: strip file prefix, lighten timestamp
  function renderLine(rawLine, isRawRow) {
    const display = isRawRow ? rawLine : rawLine.replace(FILE_PFX_RE, '');
    const tsM = display.match(TS_RE);
    if (tsM) {
      return `<span style="color:#94a3b8">${escHtml(tsM[1])}</span> ${escHtml(display.slice(tsM[0].length))}`;
    }
    return escHtml(display);
  }

  let html = `<div style="background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:.5rem;font-family:'Courier New',monospace;font-size:.7rem;line-height:1.55">`;

  groups.forEach(grp => {
    if (grp.type === 'ctrl') {
      html += `<div style="background:#f3f0ff;border-radius:6px;padding:.2rem .5rem;margin:.25rem 0;border-left:3px solid #a78bfa">`;
      grp.lines.forEach(line => {
        const isRow = !FILE_PFX_RE.test(line) && /^ *\d+ /.test(line);
        const isSts = !isRow && CTRL_STS_RE.test(line.replace(FILE_PFX_RE, ''));
        html += `<div style="padding:0 .25rem;white-space:pre-wrap;word-break:break-all${isSts ? ';color:#6b7280;font-style:italic' : ''}">${renderLine(line, isRow)}</div>`;
      });
      html += `</div>`;
    } else if (grp.type === 'call') {
      html += `<div style="background:#dbeafe;border-radius:8px;padding:.25rem .5rem;margin:.3rem 0">`;
      grp.lines.forEach(line => {
        const isDevice = DEVICE_LINE_RE.test(line);
        html += `<div style="padding:0 .25rem;white-space:pre-wrap;word-break:break-all${isDevice ? ';background:#fef3c7;border-radius:3px' : ''}">${renderLine(line, false)}</div>`;
      });
      html += `</div>`;
    } else {
      grp.lines.forEach(line => {
        const isDevice = DEVICE_LINE_RE.test(line);
        html += `<div style="padding:0 .5rem;white-space:pre-wrap;word-break:break-all${isDevice ? ';background:#fef3c7;border-radius:3px' : ''}">${renderLine(line, false)}</div>`;
      });
    }
  });

  html += `</div>`;
  return html;
}

function toggleElement(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('d-none');
}

// ═══════════════════════════════════════════════════════
//  Entry points
// ═══════════════════════════════════════════════════════
function addReport() {
  const raw = document.getElementById('reportInput').value.trim();
  if (!raw) {
    const ta = document.getElementById('reportInput');
    ta.classList.add('is-invalid');
    setTimeout(() => ta.classList.remove('is-invalid'), 1500);
    return;
  }
  let parsed;
  try { parsed = parseReport(raw); } catch(e) {
    console.error(e);
    alert('Could not parse the report. Make sure you pasted the full diagnosis report text.');
    return;
  }
  const id = nextId++;
  reports.push({ id, raw, parsed, status: getReportStatus(parsed) });
  document.getElementById('reportInput').value = '';
  renderReportsList();
  renderTrendsSection();
  // Auto-open the first report
  if (reports.length === 1) setTimeout(() => toggleReport(id, true), 30);
}

function deleteReport(id) {
  const idx = reports.findIndex(r => r.id === id);
  if (idx >= 0) reports.splice(idx, 1);
  renderReportsList();
  renderTrendsSection();
}

function toggleReport(id, forceOpen) {
  const detail = document.getElementById(`detail-${id}`);
  const btn    = document.getElementById(`toggle-btn-${id}`);
  if (!detail) return;
  const opening = forceOpen === true ? true : forceOpen === false ? false : detail.classList.contains('d-none');
  detail.classList.toggle('d-none', !opening);
  if (btn) btn.textContent = opening ? '▲' : '▼';
}

function clearInput() {
  document.getElementById('reportInput').value = '';
  document.getElementById('reportInput').focus();
}

function removeAll() {
  if (reports.length === 0) return;
  if (!confirm(`Remove all ${reports.length} report${reports.length > 1 ? 's' : ''}?`)) return;
  reports.length = 0;
  Object.values(chartInstances).forEach(c => c.destroy());
  Object.keys(chartInstances).forEach(k => delete chartInstances[k]);
  document.getElementById('reportsSection').classList.add('d-none');
  document.getElementById('trendsSection').classList.add('d-none');
  document.getElementById('trendsSection').innerHTML = '';
}

function openRawLogOverlay(uid) {
  const src = document.getElementById(uid);
  if (!src) return;
  document.getElementById('rawlog-overlay-body').innerHTML = src.innerHTML;
  document.getElementById('rawlog-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeRawLogOverlay() {
  document.getElementById('rawlog-overlay').style.display = 'none';
  document.body.style.overflow = '';
  document.getElementById('rawlog-overlay-body').innerHTML = '';
}

document.getElementById('reportInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addReport();
});

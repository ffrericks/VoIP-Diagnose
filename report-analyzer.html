<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voys Report Analyzer</title>
  <link rel="icon" type="image/png" href="https://www.voys.nl/app/themes/voys/public/build/assets/favicon-32x32-BEMKwA8R.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --voys: #270697;
      --voys-rgb: 39, 6, 151;
      --voys-dark: #1d0572;
      --bs-font-sans-serif: 'Montserrat', sans-serif;
    }

    body { background-color: #f5f4fb; color: #1a1a2e; }

    .card { border: 1px solid rgba(0,0,0,.07); border-radius: 14px; }

    .btn-primary { background-color: var(--voys); border-color: var(--voys); }
    .btn-primary:hover, .btn-primary:focus { background-color: var(--voys-dark); border-color: var(--voys-dark); }

    .btn-outline-primary { color: var(--voys); border-color: var(--voys); }
    .btn-outline-primary:hover { background-color: var(--voys); color: #fff; }

    .text-primary { color: var(--voys) !important; }

    .form-control:focus, .form-select:focus {
      border-color: var(--voys);
      box-shadow: 0 0 0 0.2rem rgba(var(--voys-rgb), 0.15);
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: .03em;
    }
    .badge-ok   { background: rgba(25,135,84,.1);  color: #157347; border: 1px solid rgba(25,135,84,.25); }
    .badge-warn { background: rgba(255,193,7,.15); color: #856404; border: 1px solid rgba(255,193,7,.4); }
    .badge-bad  { background: rgba(220,53,69,.08); color: #b02a37; border: 1px solid rgba(220,53,69,.25); }
    .badge-info { background: rgba(var(--voys-rgb),.07); color: var(--voys); border: 1px solid rgba(var(--voys-rgb),.2); }
    .badge-na   { background: rgba(0,0,0,.05); color: #6c757d; border: 1px solid rgba(0,0,0,.12); }

    /* ── Overall status bar ── */
    .overall-bar {
      border-radius: 12px; padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 12px;
    }
    .overall-ok   { background: rgba(25,135,84,.08);  border: 1.5px solid rgba(25,135,84,.3); }
    .overall-warn { background: rgba(255,193,7,.12);  border: 1.5px solid rgba(255,193,7,.5); }
    .overall-bad  { background: rgba(220,53,69,.07);  border: 1.5px solid rgba(220,53,69,.3); }

    .overall-icon { font-size: 1.6rem; line-height: 1; }

    /* ── Metric cards ── */
    .metric-card {
      border-radius: 12px; padding: 1rem 1.1rem;
      border: 1px solid rgba(0,0,0,.08);
      background: #fff; height: 100%;
    }
    .metric-title { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; margin-bottom: .5rem; }
    .metric-value { font-size: .95rem; font-weight: 600; }
    .metric-sub   { font-size: .78rem; color: #6c757d; margin-top: 2px; }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .dot-ok   { background: #198754; }
    .dot-warn { background: #ffc107; }
    .dot-bad  { background: #dc3545; }
    .dot-na   { background: #adb5bd; }

    /* ── Tip cards ── */
    .tip-card {
      border-radius: 10px; padding: .85rem 1rem;
      border-left: 4px solid; margin-bottom: .6rem;
    }
    .tip-bad  { border-color: #dc3545; background: rgba(220,53,69,.05); }
    .tip-warn { border-color: #ffc107; background: rgba(255,193,7,.07); }
    .tip-info { border-color: var(--voys); background: rgba(var(--voys-rgb),.05); }
    .tip-ok   { border-color: #198754; background: rgba(25,135,84,.05); }

    .tip-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; opacity: .7; }
    .tip-body  { font-size: .875rem; margin-top: 2px; }

    /* ── Section headers ── */
    .section-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #6c757d;
      border-bottom: 1px solid rgba(0,0,0,.07);
      padding-bottom: .4rem; margin-bottom: .9rem;
    }

    /* ── Textarea ── */
    #reportInput { font-family: 'Courier New', monospace; font-size: .78rem; resize: vertical; }

    /* ── Copy button ── */
    .btn-copy { font-size: .78rem; }

    /* ── Fade in ── */
    #results { animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:880px">

  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <img src="https://www.voys.nl/app/themes/voys/public/build/assets/favicon-32x32-BEMKwA8R.png"
         alt="Voys" style="width:36px;height:36px;border-radius:8px">
    <div>
      <h4 class="mb-0 fw-bold text-primary">Report Analyzer</h4>
      <div style="font-size:.78rem;color:#6c757d">Voys VoIP Diagnosis · Support Tool</div>
    </div>
  </div>

  <!-- Input card -->
  <div class="card mb-4">
    <div class="card-body p-3">
      <label class="form-label fw-semibold mb-1" style="font-size:.85rem">Paste diagnosis report</label>
      <div style="font-size:.75rem;color:#6c757d;margin-bottom:.5rem">Supports Dutch and English reports</div>
      <textarea id="reportInput" class="form-control" rows="9"
        placeholder="Paste the full VoIP diagnosis report here (VOYS VOIP DIAGNOSERAPPORT / VOYS VOIP DIAGNOSIS REPORT)…"></textarea>
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary px-4" onclick="analyzeReport()">Analyse Report</button>
        <button class="btn btn-outline-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results" class="d-none"></div>

</div>

<script>
// ─────────────────────────────────────────────────────
//  Thresholds
// ─────────────────────────────────────────────────────
const T = {
  latencyGood: 50, latencyWarn: 100,
  jitterGood: 10,  jitterWarn: 30,
  pingGood: 20,    pingWarn: 50,
  lossWarn: 0.5,   lossBad: 2,
  mosGood: 4.0,    mosWarn: 3.5,
};

// ─────────────────────────────────────────────────────
//  Status helpers
// ─────────────────────────────────────────────────────
function statusOf(value, goodMax, warnMax) {
  if (value == null) return 'na';
  if (value <= goodMax) return 'ok';
  if (value <= warnMax) return 'warn';
  return 'bad';
}

function statusMOS(mos) {
  if (mos == null) return 'na';
  if (mos >= T.mosGood) return 'ok';
  if (mos >= T.mosWarn) return 'warn';
  return 'bad';
}

function worstStatus(...statuses) {
  if (statuses.includes('bad'))  return 'bad';
  if (statuses.includes('warn')) return 'warn';
  if (statuses.includes('ok'))   return 'ok';
  return 'na';
}

// ─────────────────────────────────────────────────────
//  Regex helpers — try multiple patterns
// ─────────────────────────────────────────────────────
function tryMatch(text, ...patterns) {
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return m;
  }
  return null;
}

function parseNum(text, ...patterns) {
  const m = tryMatch(text, ...patterns);
  return m ? parseFloat(m[1]) : null;
}

// ─────────────────────────────────────────────────────
//  Section splitter
// ─────────────────────────────────────────────────────
function getSection(text, ...headerKeywords) {
  const lines = text.split('\n');
  let inside = false, out = [];
  for (const line of lines) {
    const upper = line.toUpperCase();
    if (!inside && headerKeywords.some(k => upper.includes(k.toUpperCase()))) {
      inside = true; continue;
    }
    if (inside) {
      if (/─{8,}/.test(line)) break;
      out.push(line);
    }
  }
  return out.join('\n');
}

// ─────────────────────────────────────────────────────
//  Parser
// ─────────────────────────────────────────────────────
function parseReport(raw) {
  const text = raw;

  // ── Device ──
  const deviceType = tryMatch(text, /Type:\s*(.+)/i)?.[1]?.trim() ?? null;
  const deviceIP   = tryMatch(text, /IP\s+computer:\s*(.+)/i)?.[1]?.trim() ?? null;
  const timestamp  = tryMatch(text, /Gegenereerd op\s+(.+)|Generated on\s+(.+)/i)?.[1]?.trim()
                  ?? tryMatch(text, /Gegenereerd op\s+(.+)|Generated on\s+(.+)/i)?.[2]?.trim() ?? null;

  // ── Browser latency section ──
  const latSec = getSection(text, 'VERBINDINGSSNELHEID', 'CONNECTION SPEED', 'BROWSER');

  function parseServer(name) {
    const re = new RegExp(
      name + ':\\s*(\\d+)\\s*ms\\s+(?:gemiddeld|average)\\s*\\(min\\s*(\\d+)\\s*[–\\-]\\s*max\\s*(\\d+)\\s*ms,\\s*jitter\\s*(\\d+)\\s*ms\\)',
      'i'
    );
    const m = tryMatch(latSec + '\n' + text, re);
    if (!m) return null;
    return { avg: +m[1], min: +m[2], max: +m[3], jitter: +m[4] };
  }

  const voys       = parseServer('Voys');
  const osso       = parseServer('OSSO');
  const cloudflare = parseServer('Cloudflare');

  // ── Terminal ping section ──
  const pingSec = getSection(text, 'PING NAAR', 'PING TO', 'TERMINAL PING');

  const pingAvg  = parseNum(pingSec, /(?:Gemiddeld|Average):\s*(\d+)\s*ms/i);
  const pingMin  = parseNum(pingSec, /Minimum:\s*(\d+)\s*ms/i);
  const pingMax  = parseNum(pingSec, /Maximum:\s*(\d+)\s*ms/i);
  const pingLoss = parseNum(pingSec, /(?:Pakketverlies|Packet loss):\s*(\d+(?:\.\d+)?)\s*%/i);

  // ── NAT section ──
  const natSec = getSection(text, 'DOUBLE-NAT');

  const cgnatDetected = (() => {
    const r = tryMatch(natSec + '\n' + text,
      /Resultaat:\s*(Geen CGNAT|CGNAT gedetecteerd|No CGNAT|CGNAT detected)/i);
    if (!r) return null;
    const val = r[1].toLowerCase();
    return val.includes('geen') || val.includes('no') ? false : true;
  })();

  const hopLines = (natSec.match(/Hop \d+:.+/gi) || []);
  const hopCount = hopLines.length;

  // Count hops with private IPs to detect double NAT from traceroute
  function isPrivateIP(ip) {
    const p = ip.split('.').map(Number);
    return p[0] === 10 ||
           (p[0] === 172 && p[1] >= 16 && p[1] <= 31) ||
           (p[0] === 192 && p[1] === 168);
  }
  const privateHopCount = hopLines.filter(line => {
    const m = line.match(/:\s*(\d+\.\d+\.\d+\.\d+)/);
    return m && isPrivateIP(m[1]);
  }).length;
  // null = no traceroute data; false = no double NAT; true = double NAT
  const doubleNatTraceroute = hopCount > 0 ? (privateHopCount >= 2) : null;

  // ── Calls section ──
  const callSec = getSection(text, 'GESPREKKEN', 'CALLS (');

  const avgMOS = parseNum(callSec,
    /Gemiddelde MOS alle gesprekken:\s*(\d+\.\d+)/i,
    /Average MOS all calls:\s*(\d+\.\d+)/i,
    /Average MOS[^:]*:\s*(\d+\.\d+)/i
  );

  // Individual calls — search only the calls section to avoid duplicates
  const callSrc = callSec.trim() ? callSec : text;
  const callMatches = [...callSrc.matchAll(
    /(?:Gesprek|Call)\s+(\d+):\s*([^|]+?)\s*\|\s*(\w+)\s*\|\s*(?:Duur|Duration):\s*(\S+)\s*\|\s*MOS:\s*(\S+)/gi
  )];
  const calls = callMatches.map(m => ({
    n: +m[1],
    datetime: m[2]?.trim(),
    direction: m[3],
    duration: m[4],
    mos: m[5] === '?' ? null : parseFloat(m[5]),
  }));

  // ── SIP section ──
  const sipSec = getSection(text, 'SIP VERBINDING', 'SIP CONNECTION');

  const sipResult = tryMatch(sipSec, /Resultaat:\s*(.+)|Result:\s*(.+)/i);
  const sipStatus = sipResult ? (sipResult[1] ?? sipResult[2])?.trim() : null;
  const sipOK     = sipStatus ? sipStatus.includes('200') : null;
  const sipResp   = parseNum(sipSec, /(?:Reactietijd|Response time):\s*(\d+)\s*ms/i);
  const sipConn   = parseNum(sipSec, /(?:Verbindingstijd|Connection time):\s*(\d+)\s*ms/i);

  // ── Console log analysis ──
  const logSec = getSection(text, 'CONSOLE LOG');

  const sentryBlocked   = /ERR_BLOCKED_BY_CLIENT/i.test(logSec);
  const iceFailed       = /ICE.*fail|ice.*failed/i.test(logSec);
  const soundFailed     = /sound.*failed|audio.*error|mediadevice.*error/i.test(logSec);
  const mosUndefined    = /MOS stats for terminated.*undefined/i.test(logSec);
  const sentryBlockCount = (logSec.match(/ERR_BLOCKED_BY_CLIENT/gi) || []).length;

  // Client ID (present in every console log line, used to look up customer in portal)
  const clientIdMatch = (logSec + '\n' + text).match(/clientId:\s*(\d+)/i);
  const clientId = clientIdMatch ? +clientIdMatch[1] : null;

  // Webphone version
  const version = tryMatch(text, /version:\s*'(v[\d.]+[^']*)'/)?.[ 1] ?? null;

  return {
    timestamp, deviceType, deviceIP, version,
    voys, osso, cloudflare,
    pingAvg, pingMin, pingMax, pingLoss,
    cgnatDetected, hopCount, doubleNatTraceroute, privateHopCount,
    calls, avgMOS,
    sipStatus, sipOK, sipResp, sipConn,
    sentryBlocked, sentryBlockCount, iceFailed, soundFailed, mosUndefined,
    clientId,
  };
}

// ─────────────────────────────────────────────────────
//  Badge helpers
// ─────────────────────────────────────────────────────
function dot(s)   { return `<span class="dot dot-${s} me-1"></span>`; }
function badge(s, label) { return `<span class="status-badge badge-${s}">${dot(s)}${label}</span>`; }

function latBadge(ms) {
  if (ms == null) return badge('na', 'No data');
  const s = statusOf(ms, T.latencyGood, T.latencyWarn);
  return badge(s, ms + ' ms');
}
function jitterBadge(ms) {
  if (ms == null) return badge('na', 'No data');
  const s = statusOf(ms, T.jitterGood, T.jitterWarn);
  return badge(s, 'Jitter ' + ms + ' ms');
}
function lossBadge(pct) {
  if (pct == null) return badge('na', 'No data');
  const s = statusOf(pct, T.lossWarn, T.lossBad);
  return badge(s, pct + '% loss');
}
function mosBadge(mos) {
  if (mos == null) return badge('na', 'No data');
  const s = statusMOS(mos);
  return badge(s, 'MOS ' + mos.toFixed(2));
}

// ─────────────────────────────────────────────────────
//  Tips engine
// ─────────────────────────────────────────────────────
function buildTips(d) {
  const tips = [];

  // SIP failure — always first, it's the most critical
  if (d.sipOK === false) {
    tips.push({ level: 'bad', title: 'SIP Connection Failed', body:
      `The webphone could not connect to the Voys servers (result: ${d.sipStatus ?? 'unknown'}). ` +
      `Ask the customer to: <ul class="mb-0 mt-1"><li>Check if a firewall or security software is blocking VoIP traffic (ports 5060–5061 TCP/UDP and UDP 10000–20000).</li>` +
      `<li>Temporarily disable their firewall and retry.</li>` +
      `<li>Try a different network (e.g. mobile hotspot) to rule out ISP blocking.</li></ul>` });
  }

  // ICE failure
  if (d.iceFailed) {
    tips.push({ level: 'bad', title: 'WebRTC / ICE Connection Error', body:
      `ICE negotiation failed — the browser could not establish a peer-to-peer media path. ` +
      `This often points to a strict firewall or CGNAT issue. ` +
      `Ask the customer to try a different network, or check if STUN/TURN ports are blocked.` });
  }

  // Packet loss
  if (d.pingLoss != null && d.pingLoss >= T.lossBad) {
    tips.push({ level: 'bad', title: `High Packet Loss: ${d.pingLoss}%`, body:
      `Packets are being lost on the network — this directly causes choppy or broken audio during calls. ` +
      `Steps for the customer: <ul class="mb-0 mt-1">` +
      `<li>Restart the modem and router (unplug for 30 seconds).</li>` +
      `<li>Try a wired ethernet connection instead of WiFi.</li>` +
      `<li>Check all network cables for damage.</li>` +
      `<li>If the issue persists, ask the customer to contact their ISP — the problem may be on their line.</li></ul>` });
  } else if (d.pingLoss != null && d.pingLoss > 0) {
    tips.push({ level: 'warn', title: `Minor Packet Loss: ${d.pingLoss}%`, body:
      `A small number of network packets are being dropped. This may cause occasional glitches. ` +
      `Recommend restarting the router and using a wired connection if issues occur.` });
  }

  // If terminal ping is good, browser latency figures are unreliable (browser overhead)
  // and should not be raised as actionable warnings.
  const terminalPingOK = d.pingAvg != null && d.pingAvg <= T.pingGood &&
                         (d.pingLoss == null || d.pingLoss === 0);

  // High latency to Voys
  if (d.voys != null) {
    if (d.voys.avg > T.latencyWarn) {
      if (terminalPingOK) {
        tips.push({ level: 'info', title: `Browser Latency to Voys Elevated: ${d.voys.avg} ms (not critical)`, body:
          `The browser measured high latency to Voys (${d.voys.avg} ms), but the terminal ping is excellent ` +
          `(${d.pingAvg} ms, 0% loss). This discrepancy is usually browser overhead, not a real network issue. ` +
          `No action needed unless the customer reports actual call problems.` });
      } else {
        tips.push({ level: 'bad', title: `High Latency to Voys: ${d.voys.avg} ms`, body:
          `The connection to Voys servers is very slow. ` +
          `<ul class="mb-0 mt-1">` +
          `<li>Is the customer using a <strong>VPN</strong>? VPNs can add 50–200 ms of latency — try disabling it.</li>` +
          `<li>Recommend switching from WiFi to a <strong>wired ethernet</strong> connection.</li>` +
          `<li>Check for other applications or devices consuming bandwidth (streaming, large downloads).</li></ul>` });
      }
    } else if (d.voys.avg > T.latencyGood && !terminalPingOK) {
      tips.push({ level: 'warn', title: `Elevated Latency to Voys: ${d.voys.avg} ms`, body:
        `Latency is somewhat elevated. Calls may still work fine, but audio quality could be affected under load. ` +
        `Suggest a wired connection for a more stable experience.` });
    }
  }

  // High jitter
  const worstJitter = Math.max(
    d.voys?.jitter ?? 0,
    d.osso?.jitter ?? 0,
    d.cloudflare?.jitter ?? 0
  );
  if (!terminalPingOK) {
    if (worstJitter > T.jitterWarn) {
      tips.push({ level: 'bad', title: `High Jitter: ${worstJitter} ms`, body:
        `The connection is unstable (high jitter) — this typically causes robotic or choppy audio. ` +
        `<ul class="mb-0 mt-1">` +
        `<li>Switch to a <strong>wired ethernet connection</strong> — WiFi jitter is the #1 cause of VoIP audio issues.</li>` +
        `<li>Restart the router and modem.</li>` +
        `<li>Move the device closer to the router if WiFi must be used.</li>` +
        `<li>Check for other wireless devices causing interference (microwaves, cordless phones, neighboring networks).</li></ul>` });
    } else if (worstJitter > T.jitterGood) {
      tips.push({ level: 'warn', title: `Moderate Jitter: ${worstJitter} ms`, body:
        `Some network instability detected. A wired connection is recommended for the best call quality.` });
    }
  }

  // Double NAT — prefer traceroute result over CGNAT flag
  if (d.doubleNatTraceroute === true) {
    tips.push({ level: 'warn', title: `Double NAT Detected (${d.privateHopCount} private hops in traceroute)`, body:
      `The traceroute shows multiple private IP address hops, meaning the customer is behind two NAT layers. ` +
      `This can cause issues with incoming calls or intermittent drops. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Ask the customer if they have a modem <em>and</em> a separate router — both doing NAT is a common cause.</li>` +
      `<li>Advise them to put the ISP modem in <strong>bridge/passthrough mode</strong> so only one device does NAT.</li>` +
      `<li>Alternatively, contact their ISP and request a <strong>public IP address</strong>.</li>` +
      `<li>Ask if the ISP modem has a <strong>SIP ALG</strong> setting — if so, it should be disabled.</li></ul>` });
  } else if (d.doubleNatTraceroute === null && d.cgnatDetected === true) {
    // No traceroute data — fall back to CGNAT flag
    tips.push({ level: 'warn', title: 'CGNAT Detected', body:
      `The customer appears to be behind CGNAT (Carrier-Grade NAT) — their ISP shares a public IP across multiple customers. ` +
      `This can cause issues with incoming calls. ` +
      `<ul class="mb-0 mt-1">` +
      `<li>Advise the customer to contact their ISP and request a <strong>dedicated public IP address</strong>.</li>` +
      `<li>Ask if the ISP modem has a <strong>SIP ALG</strong> setting — if so, it should be disabled.</li></ul>` });
  }

  // Low MOS
  if (d.avgMOS != null && d.avgMOS < T.mosWarn) {
    tips.push({ level: 'bad', title: `Poor Call Quality (MOS ${d.avgMOS.toFixed(2)})`, body:
      `The average call quality score is low (MOS below 3.5 is considered poor). ` +
      `Look at the latency, jitter and packet loss metrics above to find the root cause. ` +
      `MOS drops are almost always caused by an unstable or congested network connection.` });
  } else if (d.avgMOS != null && d.avgMOS < T.mosGood) {
    tips.push({ level: 'warn', title: `Fair Call Quality (MOS ${d.avgMOS.toFixed(2)})`, body:
      `Call quality is acceptable but not optimal. Monitor for customer complaints about audio quality. ` +
      `A wired connection may improve the score.` });
  }

  // Calls with no MOS data
  if (d.mosUndefined) {
    tips.push({ level: 'info', title: 'Call Without Quality Data', body:
      `One or more calls ended before quality metrics could be collected. ` +
      `This usually means the call was very short (under 5 seconds) or was rejected/dropped before connecting.` });
  }

  // Sound device issues
  if (d.soundFailed) {
    tips.push({ level: 'bad', title: 'Audio Device Error Detected', body:
      `The console log shows an audio device error. ` +
      `Ask the customer to: <ul class="mb-0 mt-1">` +
      `<li>Check that their headset or microphone is properly connected.</li>` +
      `<li>Select the correct audio device in the webphone settings (gear icon → Audio).</li>` +
      `<li>Try unplugging and re-plugging the headset.</li>` +
      `<li>Test the audio device in another application to confirm it works.</li></ul>` });
  }

  // Sentry blocked — informational only
  if (d.sentryBlocked) {
    tips.push({ level: 'info', title: 'Error Reporting Blocked (Ad Blocker)', body:
      `Sentry error reporting is being blocked (${d.sentryBlockCount} requests blocked). ` +
      `This is caused by an ad blocker or privacy extension and is <strong>not critical</strong> — ` +
      `it does not affect call quality. You can ignore this.` });
  }

  // All OK
  if (tips.length === 0) {
    tips.push({ level: 'ok', title: 'Everything Looks Good', body:
      `All metrics are within normal ranges. If the customer is still experiencing issues, ` +
      `consider: checking the call quality during peak usage hours, ensuring the browser is up to date, ` +
      `or collecting a new report during an active problem.` });
  }

  return tips;
}

// ─────────────────────────────────────────────────────
//  Renderer
// ─────────────────────────────────────────────────────
function renderResults(d) {
  const tips = buildTips(d);

  // Overall status
  const overallStatus = tips.some(t => t.level === 'bad')  ? 'bad'
                      : tips.some(t => t.level === 'warn') ? 'warn'
                      : 'ok';
  const overallIcons  = { ok: '✅', warn: '⚠️', bad: '❌' };
  const overallLabels = {
    ok:   'No issues found — all metrics are within normal ranges.',
    warn: 'Some issues detected — review the tips below for guidance.',
    bad:  'Critical issues detected — action required.',
  };

  // ── Overall bar ──
  let html = `
  <div class="overall-bar overall-${overallStatus} mb-4">
    <span class="overall-icon">${overallIcons[overallStatus]}</span>
    <div class="flex-grow-1">
      <div class="fw-bold">${overallStatus === 'ok' ? 'All Good' : overallStatus === 'warn' ? 'Warnings Found' : 'Issues Detected'}</div>
      <div style="font-size:.82rem;opacity:.8">${overallLabels[overallStatus]}</div>
    </div>
    ${d.clientId ? `<a href="https://partner.voys.co/client/${d.clientId}" target="_blank" rel="noopener" class="btn btn-primary btn-sm text-nowrap">Open customer in portal →</a>` : ''}
  </div>`;

  // ── Device info row ──
  html += `<div class="section-label">Device &amp; Report Info</div>
  <div class="row g-2 mb-4">
    <div class="col-6 col-md-3">${metricCard('Device Type', d.deviceType ?? '—')}</div>
    <div class="col-6 col-md-3">${metricCard('IP Address', d.deviceIP ?? 'Not determined')}</div>
    <div class="col-6 col-md-3">${metricCard('Webphone Version', d.version ?? '—')}</div>
    <div class="col-6 col-md-3">${metricCard('Report Generated', d.timestamp ?? '—')}</div>
  </div>`;

  // ── Browser latency ──
  html += `<div class="section-label">Browser Latency (Ping to Servers)</div>
  <div class="row g-2 mb-4">
    ${serverCard('Voys', d.voys)}
    ${serverCard('OSSO', d.osso)}
    ${serverCard('Cloudflare', d.cloudflare)}
  </div>`;

  // ── Terminal ping ──
  const pingStatus = worstStatus(
    statusOf(d.pingAvg, T.pingGood, T.pingWarn),
    statusOf(d.pingLoss, T.lossWarn, T.lossBad)
  );
  html += `<div class="section-label">Terminal Ping (ha.voys.nl)</div>
  <div class="row g-2 mb-4">
    <div class="col-6 col-md-3">${metricCard('Avg Ping', d.pingAvg != null ? d.pingAvg + ' ms' : '—', statusOf(d.pingAvg, T.pingGood, T.pingWarn), d.pingMin != null ? `min ${d.pingMin} ms · max ${d.pingMax} ms` : '')}</div>
    <div class="col-6 col-md-3">${metricCard('Packet Loss', d.pingLoss != null ? d.pingLoss + '%' : '—', statusOf(d.pingLoss, T.lossWarn, T.lossBad))}</div>
  </div>`;

  // ── NAT ──
  const natStatus = d.doubleNatTraceroute === true  ? 'warn'
                  : d.doubleNatTraceroute === false  ? 'ok'
                  : d.cgnatDetected === true          ? 'warn'
                  : d.cgnatDetected === false         ? 'ok'
                  : 'na';
  const natLabel  = d.doubleNatTraceroute === true  ? `Double NAT (${d.privateHopCount} private hops)`
                  : d.doubleNatTraceroute === false  ? 'No Double NAT ✓'
                  : d.cgnatDetected === true          ? 'CGNAT Detected'
                  : d.cgnatDetected === false         ? 'No CGNAT ✓'
                  : '—';
  const natSub    = d.hopCount > 0 ? `Traceroute: ${d.hopCount} hops` : null;
  html += `<div class="section-label">Network / NAT</div>
  <div class="row g-2 mb-4">
    <div class="col-6 col-md-3">${metricCard('Double NAT', natLabel, natStatus, natSub)}</div>
  </div>`;

  // ── Calls ──
  html += `<div class="section-label">Call Quality (MOS)</div>`;

  if (d.calls.length > 0) {
    html += `<div class="card mb-4"><div class="table-responsive">
    <table class="table table-sm table-hover mb-0" style="font-size:.85rem">
      <thead><tr style="font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;border-bottom:2px solid rgba(0,0,0,.08)">
        <th class="ps-3" style="width:2rem">#</th>
        <th style="width:6rem">Time</th>
        <th>Direction</th>
        <th>Duration</th>
        <th>MOS</th>
        <th>Quality</th>
      </tr></thead><tbody>`;

    d.calls.forEach(c => {
      const isOut    = c.direction === 'Uitgaand' || c.direction.toLowerCase().includes('out');
      const dirLabel = isOut ? 'Outgoing' : 'Incoming';
      const dirIcon  = isOut ? '↗' : '↙';
      const timeStr  = (() => {
        if (!c.datetime || c.datetime.trim() === '?' || c.datetime.trim() === '? ?') return '—';
        const parts = c.datetime.trim().split(' ');
        return parts.length >= 2 ? parts[1] : c.datetime.trim();
      })();
      const mosStatus = statusMOS(c.mos);
      const qualLabel = c.mos == null ? 'No data'
                      : c.mos >= 4.0  ? 'Excellent'
                      : c.mos >= 3.5  ? 'Good'
                      : c.mos >= 3.0  ? 'Fair'
                      : 'Poor';
      html += `<tr>
        <td class="ps-3 text-muted fw-semibold">${c.n}</td>
        <td class="text-muted">${timeStr}</td>
        <td><span style="opacity:.5;margin-right:4px">${dirIcon}</span>${dirLabel}</td>
        <td>${c.duration !== '?' ? c.duration : '—'}</td>
        <td><span class="dot dot-${mosStatus} me-1"></span><strong>${c.mos != null ? c.mos.toFixed(2) : '—'}</strong></td>
        <td><span class="status-badge badge-${mosStatus}" style="padding:2px 10px;font-size:.7rem">${qualLabel}</span></td>
      </tr>`;
    });

    if (d.avgMOS != null) {
      const s = statusMOS(d.avgMOS);
      html += `<tr style="border-top:2px solid rgba(0,0,0,.08)">
        <td class="ps-3" colspan="4" style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6c757d;vertical-align:middle">Average MOS</td>
        <td><span class="dot dot-${s} me-1"></span><strong>${d.avgMOS.toFixed(2)}</strong></td>
        <td style="font-size:.72rem;color:#6c757d">Scale 1–5</td>
      </tr>`;
    }

    html += `</tbody></table></div></div>`;
  } else {
    html += `<div class="row g-2 mb-4">
      <div class="col-6 col-md-3">${metricCard('Average MOS', d.avgMOS != null ? d.avgMOS.toFixed(2) : '—', statusMOS(d.avgMOS), 'Scale: 1 (bad) – 5 (perfect)')}</div>
    </div>`;
  }

  // ── SIP ──
  const sipStatusLevel = d.sipOK === true ? 'ok' : d.sipOK === false ? 'bad' : 'na';
  html += `<div class="section-label">SIP Connection Test</div>
  <div class="row g-2 mb-4">
    <div class="col-6 col-md-3">${metricCard('SIP Result', d.sipStatus ?? '—', sipStatusLevel)}</div>
    <div class="col-6 col-md-3">${metricCard('Response Time', d.sipResp != null ? d.sipResp + ' ms' : '—')}</div>
    <div class="col-6 col-md-3">${metricCard('Connection Time', d.sipConn != null ? d.sipConn + ' ms' : '—')}</div>
  </div>`;

  // ── Console log notes ──
  const logItems = [
    d.iceFailed       && { s: 'bad',  t: 'ICE failure in log' },
    d.soundFailed     && { s: 'bad',  t: 'Audio device error in log' },
    d.mosUndefined    && { s: 'warn', t: 'Call with no MOS data' },
    d.sentryBlocked   && { s: 'info', t: `Sentry blocked ×${d.sentryBlockCount} (ad blocker)` },
  ].filter(Boolean);

  if (logItems.length > 0) {
    html += `<div class="section-label">Console Log</div>
    <div class="d-flex flex-wrap gap-2 mb-4">`;
    logItems.forEach(item => {
      html += `<span class="status-badge badge-${item.s}">${dot(item.s)}${item.t}</span>`;
    });
    html += `</div>`;
  }

  // ── Tips ──
  html += `<div class="section-label d-flex justify-content-between align-items-center">
    <span>Customer Tips</span>
    <button class="btn btn-outline-primary btn-sm btn-copy" onclick="copyTips()">Copy tips as text</button>
  </div>`;

  tips.forEach(tip => {
    html += `<div class="tip-card tip-${tip.level}">
      <div class="tip-label">${{ bad:'Action required', warn:'Attention', info:'Note', ok:'All good' }[tip.level]}</div>
      <div class="fw-semibold" style="font-size:.875rem;margin-top:2px">${tip.title}</div>
      <div class="tip-body text-muted">${tip.body}</div>
    </div>`;
  });

  const el = document.getElementById('results');
  el.innerHTML = html;
  el.classList.remove('d-none');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function metricCard(title, value, status, sub) {
  const s = status ?? 'na';
  return `<div class="metric-card">
    <div class="metric-title">${title}</div>
    <div class="d-flex align-items-center gap-2">
      <span class="dot dot-${s}"></span>
      <span class="metric-value">${value}</span>
    </div>
    ${sub ? `<div class="metric-sub">${sub}</div>` : ''}
  </div>`;
}

function serverCard(name, data) {
  if (!data) {
    return `<div class="col-6 col-md-4">${metricCard(name + ' Latency', '—', 'na', 'No data')}</div>`;
  }
  const latStatus    = statusOf(data.avg, T.latencyGood, T.latencyWarn);
  const jitterStatus = statusOf(data.jitter, T.jitterGood, T.jitterWarn);
  const worst        = worstStatus(latStatus, jitterStatus);
  const sub          = `min ${data.min} · max ${data.max} · jitter ${data.jitter} ms`;
  return `<div class="col-6 col-md-4">${metricCard(name, data.avg + ' ms avg', worst, sub)}</div>`;
}

function worstStatus(...s) {
  if (s.includes('bad'))  return 'bad';
  if (s.includes('warn')) return 'warn';
  if (s.includes('ok'))   return 'ok';
  return 'na';
}

// ─────────────────────────────────────────────────────
//  Copy tips as plain text
// ─────────────────────────────────────────────────────
function copyTips() {
  const tipCards = document.querySelectorAll('.tip-card');
  let text = 'VOYS REPORT ANALYZER — CUSTOMER TIPS\n\n';
  tipCards.forEach(card => {
    const level = card.querySelector('.tip-label')?.textContent ?? '';
    const title = card.querySelector('.fw-semibold')?.textContent ?? '';
    const body  = card.querySelector('.tip-body')?.innerText ?? '';
    text += `[${level.toUpperCase()}] ${title}\n${body}\n\n`;
  });
  navigator.clipboard.writeText(text.trim())
    .then(() => {
      const btn = document.querySelector('.btn-copy');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
}

// ─────────────────────────────────────────────────────
//  Entry points
// ─────────────────────────────────────────────────────
function analyzeReport() {
  const raw = document.getElementById('reportInput').value.trim();
  if (!raw) {
    document.getElementById('reportInput').classList.add('is-invalid');
    setTimeout(() => document.getElementById('reportInput').classList.remove('is-invalid'), 1500);
    return;
  }
  try {
    const data = parseReport(raw);
    renderResults(data);
  } catch (e) {
    console.error(e);
    document.getElementById('results').innerHTML =
      `<div class="alert alert-danger">Could not parse the report. Make sure you pasted the full diagnosis report text.</div>`;
    document.getElementById('results').classList.remove('d-none');
  }
}

function clearAll() {
  document.getElementById('reportInput').value = '';
  const el = document.getElementById('results');
  el.innerHTML = '';
  el.classList.add('d-none');
  document.getElementById('reportInput').focus();
}

document.getElementById('reportInput').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyzeReport();
});
</script>

</html>
